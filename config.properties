# ═══════════════════════════════════════════
# BASE CONFIGURATION — Neil's AI Automation
# ═══════════════════════════════════════════
# DO NOT commit secrets to GitHub!
# Use environment variables for API keys.

# ── Environment ──
env=dev

# ── PetStore API ──
petstore.base.url=https://petstore3.swagger.io/api/v3
petstore.timeout.connect=10000
petstore.timeout.read=30000

# ── OpenAI ──
openai.model=gpt-4
openai.max.tokens=2000
openai.temperature=0.3

# ── API Keys (override with env vars!) ──
openai.api.key=${OPENAI_API_KEY}
assemblyai.api.key=${ASSEMBLYAI_API_KEY}
stripe.api.key=${STRIPE_TEST_API_KEY}

# ── Test Settings ──
ai.enabled=false
test.retry.count=2
test.parallel=false
test.thread.count=4

# ── Reporting ──
allure.results.dir=build/allure-results
